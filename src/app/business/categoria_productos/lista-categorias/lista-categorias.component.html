<mat-card class="cardWithShadow">
  <mat-card-content>
    <div class="table-responsive">
      <table mat-table [dataSource]="getPagedCategorias()" class="w-100">
        <!-- Categoría -->
        <ng-container matColumnDef="categoria">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">
            Categoría
          </th>

          <td mat-cell *matCellDef="let categoria" class="f-s-14">
            <div class="d-flex align-items-center">
              <div
                class="icon-40 bg-light-primary rounded-circle d-flex align-items-center justify-content-center"
              >
                <i-tabler name="category" class="icon-20 text-primary">
                </i-tabler>
              </div>

              <div class="m-l-16">
                <h6 class="f-s-14 f-w-600 m-0">
                  {{ categoria.categoria }}
                </h6>
              </div>
            </div>
          </td>
        </ng-container>

        <!-- Acciones -->
        <ng-container matColumnDef="acciones">
          <th
            mat-header-cell
            *matHeaderCellDef
            class="text-center f-w-600 f-s-14"
          >
            Acciones
          </th>

          <td mat-cell *matCellDef="let categoria" class="text-center">
            <div class="d-flex align-items-center justify-content-center gap-8">
              <!-- Editar -->
              <button
                mat-icon-button
                color="primary"
                (click)="editarCategoria(categoria)"
              >
                <i-tabler name="edit" class="icon-18"> </i-tabler>
              </button>

              <!-- Eliminar -->
              <button
                mat-icon-button
                color="warn"
                (click)="deleteCategoria(categoria.id)"
              >
                <i-tabler name="trash" class="icon-18"> </i-tabler>
              </button>
            </div>
          </td>
        </ng-container>

        <!-- Header -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

        <!-- Rows -->
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      @if (getPagedCategorias().length === 0) {
        <div class="text-center p-y-32">No hay categorías disponibles</div>
      }
    </div>

    <!-- Paginador -->
    <mat-paginator
      [length]="categoriaProductos.length"
      [pageSize]="pageSize"
      [pageIndex]="currentPage - 1"
      [pageSizeOptions]="[5, 10, 20]"
      (page)="onPageChange($event)"
      showFirstLastButtons
    >
    </mat-paginator>
  </mat-card-content>
</mat-card>
