<mat-card class="cardWithShadow">
  <mat-card-content>
    <!-- Header -->
    <div class="row m-b-16">
      <div class="col-sm-6">
        <app-cliente-search (searchChange)="onSearch($event)">
        </app-cliente-search>
      </div>

      <div class="col-sm-6 d-flex justify-content-end gap-8">
        <button
          mat-stroked-button
          color="primary"
          (click)="getClientesByEmpresaId()"
        >
          Refresh
        </button>

        <app-nuevo-cliente
          [cliente]="clienteSeleccionado"
          [isEditMode]="isEditMode"
          (clienteGuardado)="onClienteGuardado($event)"
        >
        </app-nuevo-cliente>
      </div>
    </div>

    <!-- Tabla -->
    <div class="table-responsive table-sm">
      <div class="table-responsive">
        <table mat-table [dataSource]="getPagedClientes()" class="w-100">
          <!-- Nombre -->
          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14 p-l-0">
              Nombre
            </th>

            <td mat-cell *matCellDef="let cliente" class="p-l-0">
              <div class="d-flex align-items-center">
                <div
                  class="icon-40 bg-light-primary rounded-circle d-flex align-items-center justify-content-center"
                >
                  <i-tabler name="user" class="icon-20 text-primary">
                  </i-tabler>
                </div>

                <div class="m-l-16">
                  <h6 class="f-s-14 f-w-600 m-0">
                    {{ cliente.nombre }}
                  </h6>

                  <span class="f-s-12 text-body">
                    {{ cliente.correo || "" }}
                  </span>
                </div>
              </div>
            </td>
          </ng-container>

          <!-- Identificación -->
          <ng-container matColumnDef="identificacion">
            <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">
              Identificación
            </th>

            <td mat-cell *matCellDef="let cliente" class="f-s-14">
              {{ cliente.identificacion }}
            </td>
          </ng-container>

          <!-- Teléfono -->
          <ng-container matColumnDef="telefono">
            <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">
              Teléfono
            </th>

            <td mat-cell *matCellDef="let cliente" class="f-s-14">
              {{ cliente.telefono }}
            </td>
          </ng-container>

          <!-- Dirección -->
          <ng-container matColumnDef="direccion">
            <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">
              Dirección
            </th>

            <td mat-cell *matCellDef="let cliente" class="f-s-14">
              {{ cliente.direccion }}
            </td>
          </ng-container>

          <!-- Acciones -->
          <ng-container matColumnDef="acciones">
            <th
              mat-header-cell
              *matHeaderCellDef
              class="text-center f-w-600 f-s-14"
            >
              Acciones
            </th>

            <td mat-cell *matCellDef="let cliente" class="text-center">
              <div
                class="d-flex align-items-center justify-content-center gap-8"
              >
                <!-- Editar -->
                <app-nuevo-cliente
                  [cliente]="cliente"
                  [isEditMode]="true"
                  (clienteGuardado)="onClienteGuardado($event)"
                >
                </app-nuevo-cliente>

                <!-- Eliminar -->
                <button
                  mat-icon-button
                  color="warn"
                  (click)="deleteCliente(cliente.id)"
                >
                  <i-tabler name="trash" class="icon-18"> </i-tabler>
                </button>
              </div>
            </td>
          </ng-container>

          <!-- Header -->
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

          <!-- Rows -->
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>

        @if (getPagedClientes().length === 0) {
          <div class="text-center p-y-32">No hay clientes disponibles</div>
        }
      </div>

      <!-- paginator -->
      <mat-paginator
        [length]="filteredClientes().length"
        [pageSize]="itemsPerPage"
        [pageIndex]="currentPage - 1"
        [pageSizeOptions]="[5, 10, 20, 50]"
        (page)="onPageChange($event)"
        showFirstLastButtons
      >
      </mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
