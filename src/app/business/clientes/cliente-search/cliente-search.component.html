<mat-form-field appearance="outline" class="w-100 search-field">
  <mat-label>Buscar clientes</mat-label>

  <span matPrefix class="search-prefix">
    <i-tabler name="search" class="icon-20"> </i-tabler>
  </span>

  <input
    #searchInput
    matInput
    type="text"
    placeholder="Buscar en clientes..."
    [value]="searchTerm()"
    (input)="onSearchChange(searchInput.value)"
  />
</mat-form-field>
