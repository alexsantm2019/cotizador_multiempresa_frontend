<div class="table-responsive mt-2">
  <div class="table-responsive">
    <mat-table #table [dataSource]="dataSource">
      <!-- Position Column -->
      <ng-container matColumnDef="assigned">
        <mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14 p-l-0">
          Assigned
        </mat-header-cell>
        <mat-cell class="p-16 p-l-0" *matCellDef="let element">
          <div class="d-flex align-items-center">
            <div class="m-l-16">
              <h6 class="f-s-14 f-w-600">
                {{ element.id }}
              </h6>
              <span class="f-s-14 f-s-12">
                {{ element.nombre }}
              </span>
            </div>
          </div>
        </mat-cell>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">ID</th>
        <td mat-cell *matCellDef="let element" class="f-s-14">
          {{ element.id }}
        </td>
      </ng-container>

      <!-- Symbol Column -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">Nombre</th>
        <td mat-cell *matCellDef="let element" class="f-s-14">
          {{ element.nombre }}
        </td>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
    </mat-table>

    <mat-paginator #paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 20]">
    </mat-paginator>
  </div>
</div>
